{% load tmdb_images %}
<div class="poster-card">
    <a href="{% url 'movies:movie_detail' movie.movie_id %}">
        {% if movie.poster_path %}
        <img class="poster" src="{{ movie.poster_path|tmdb_image:'w342' }}" alt="{{ movie.title }} poster" loading="lazy">
        {% else %}
        <div class="placeholder">🎬</div>
        {% endif %}
        <div class="card-body">
            <span class="card-title">{{ movie.title }}</span>
            <span class="card-sub">{% if movie.release_date %}{{ movie.release_date|date:"Y" }}{% else %}—{% endif %}</span>
        </div>
    </a>
</div>
